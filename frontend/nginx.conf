server {
    listen 80;
    server_name _;

    # Serve the Vite SPA from the build output
    root /usr/share/nginx/html;
    index index.html;

    # API reverse-proxy: forward /api/* and /healthz to the backend service.
    # This means the SPA never needs to know the backend's internal hostname,
    # and CORS between SPA and API is not an issue (same origin from the
    # browser's perspective).
    location /api/ {
        proxy_pass http://survey-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://survey-api:8000/healthz;
        proxy_set_header Host $host;
    }

    # SPA fallback: any path that is not a static file gets index.html
    # so that client-side React Router routes work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
