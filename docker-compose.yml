services:
  survey-db:
    image: postgres:16
    environment:
      POSTGRES_DB: survey_db
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
    ports:
      - "5433:5432"
    volumes:
      - survey_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d survey_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  survey-api:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      survey-db:
        condition: service_healthy
    restart: on-failure

volumes:
  survey_pgdata: