services:
  survey-db:
    image: postgres:16
    environment:
      POSTGRES_DB: survey_db
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
    ports:
      - "5433:5432"
    volumes:
      - survey_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d survey_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  survey-api:
    build: ./backend
    env_file:
      - ./backend/.env
    # Expose API on the host so `npm run dev` (Vite) can proxy /api → localhost:8001.
    # The survey-frontend nginx still talks to this service on the Docker network.
    ports:
      - "8001:8000"
    depends_on:
      survey-db:
        condition: service_healthy
    restart: on-failure

  survey-frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - survey-api
    restart: on-failure

volumes:
  survey_pgdata:
